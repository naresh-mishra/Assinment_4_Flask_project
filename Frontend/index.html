<!DOCTYPE html>
<html>
<head>
    <title>To-Do Page</title>
</head>
<body>

    <h2>To-Do Form</h2>

    <form id="todoForm">
        <label>Item Name:</label><br>
        <input type="text" id="itemName" required><br><br>

        <label>Item Description:</label><br>
        <textarea id="itemDescription" required></textarea><br><br>

        <label>Item ID:</label><br>
        <input type="text" id="itemId"><br><br>

        <label>Item UUID:</label><br>
<input type="text" id="itemUUID"><br><br>

<label>Item Hash:</label><br>
<input type="text" id="itemHash"><br><br>

        <button type="submit">Submit</button>
    </form>

    <script>
        document.getElementById("todoForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const itemName = document.getElementById("itemName").value;
            const itemDescription = document.getElementById("itemDescription").value;

            const response = await fetch("http://127.0.0.1:5000/submittodoitem", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    itemName: itemName,
                    itemDescription: itemDescription
                })
            });

            const data = await response.json();
            alert(data.message);
        });
    </script>

</body>
</html>
